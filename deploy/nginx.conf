# Rate limiting zones (http context via sites-enabled include)
# /api/search:   每 IP 5次/分钟，burst=3（LLM + 10源并发，最昂贵）
# /api/download: 每 IP 120次/分钟，burst=50（批量下载场景，无 LLM 调用）
# /api/其他:     每 IP 30次/分钟，burst=15
limit_req_zone $binary_remote_addr zone=api_search:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_download:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/m;

server {
    listen 80;
    server_name 118.25.192.117;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 前端静态文件
    root /var/www/scholarscout;
    index index.html;

    # React SPA：所有路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Umami 统计面板（本地 3001 端口，外部通过 /analytics 访问）
    location /analytics {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }

    # 搜索接口（最耗资源：LLM + 10源并发 + Kimi，限速更严）
    location /api/search {
        limit_req zone=api_search burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE 必须关闭缓冲
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }

    # PDF 下载代理（批量下载场景，独立宽松限速）
    location /api/download {
        limit_req zone=api_download burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 60s;
    }

    # 其余 API（parse / health）
    location /api/ {
        limit_req zone=api_general burst=15 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }
}
